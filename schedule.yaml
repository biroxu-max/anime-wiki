# Расписание выхода аниме и настройки генератора трендов.
# Добавляй сюда новые тайтлы — fetch_trends.py и вики подхватят их автоматически.
#
# Даты премьер — реальные (MyAnimeList). Число серий: реальные где известно,
# иначе оценка 12 (типичная длина тайтла). Ночные эфиры (24:00 = 00:00 след. дня)
# отнесены к пред. дню по японской телеконвенции.

timezone: "Asia/Tokyo"
language: "ru"
gemini_model: "gemini-2.5-flash"
gemini_max_output_tokens: 4000   # щедрый лимит — вика для вдохновения, с секциями JP/KOR
include_local_trends: true        # собирать тренды японского и корейского фандомов
# Отключить для конкретного тайтла: добавь в его запись `local_trends: false`

