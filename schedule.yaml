# Расписание выхода аниме и настройки генератора трендов.
# Добавляй сюда новые тайтлы — fetch_trends.py и вики подхватят их автоматически.

timezone: "Asia/Tokyo"   # часовой пояс эфира (для расчёта номера серии)
language: "ru"           # язык генерируемых страниц обсуждения
# Какую модель Gemini использовать (с поддержкой Google Search / grounding).
gemini_model: "gemini-2.5-flash"

anime:
  # --- ПРИМЕР: замени на свои тайтлы ---
  - slug: "frieren"
    title: "Frieren: Beyond Journey's End"
    title_ru: "Провожающая в последний путь Фрирен"
    title_jp: "葬送のフリーレン"
    aliases: ["Sousou no Frieren", "Фрирен", "Frieren"]
    season: 2
    weekday: "Friday"     # день недели выхода серии (на языке оригинала эфира)
    time: "00:00"         # время эфира в указанном timezone
    start_date: "2026-01-09"   # дата выхода ПЕРВОЙ серии сезона
    episodes: 24          # ожидаемое число серий в сезоне
    tags: ["фэнтези", "приключения", "повседневность", "драма"]
    synopsis: >
      После победы над Королём Демонов эльфийка-волшебница Фрирен,
      переживающая своих спутников, отправляется в путешествие,
      чтобы заново понять людей и смысл прожитых лет.

  # Шаблон для добавления нового тайтла (раскомментируй и заполни):
