# Расписание выхода аниме и настройки генератора трендов.
# Добавляй сюда новые тайтлы — fetch_trends.py и вики подхватят их автоматически.

timezone: "Asia/Tokyo"   # часовой пояс эфира (для расчёта номера серии)
language: "ru"           # язык генерируемых страниц обсуждения
# Какую модель Gemini использовать (с поддержкой Google Search / grounding).
gemini_model: "gemini-2.5-flash"

anime:
  - slug: "himekishi"        # латиница, без пробелов — попадает в URL
    title: "Himekishi wa Barbaroi no Yome"
    title_ru: "Принцесса-рыцарь — невеста варвара"
    title_jp: "姫騎士は蛮族の嫁"
    aliases: ["The Barbarian's Bride", "Himekishi wa Banzoku no Yome", "The Warrior Princess and the Barbaric King"]
    season: 1
    weekday: "Thursday"      # день выхода серии (Monday..Sunday)
    time: "21:30"            # время эфира в указанном timezone (JST)
    start_date: "2026-04-09" # дата выхода ПЕРВОЙ серии сезона
    episodes: 12             # ожидаемое число серий в сезоне
    tags: ["комедия", "фэнтези", "романтика"]
    synopsis: >
      «Просто убей меня!» — эти слова произносит Серафина де Лавийян,
      сильнейшая женщина-рыцарь Запада, когда её берёт в плен предводитель
      варваров. Вместо казни он предлагает ей стать его невестой. Романтическая
      комедия на стыке фэнтези-миров о том, как враги становятся семьёй.

