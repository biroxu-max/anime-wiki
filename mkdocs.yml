site_name: Аниме-вики
site_description: Актуальные темы обсуждения после выхода новых серий аниме
site_url: https://USERNAME.github.io/anime-wiki/
repo_url: https://github.com/USERNAME/anime-wiki
repo_name: USERNAME/anime-wiki

# >>> Замени USERNAME на свой GitHub-аккаунт после создания репозитория. <<<

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tags
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  font:
    text: Nunito
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ru
        - en
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tilde
  - pymdownx.caret
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/USERNAME/anime-wiki

# nav убран намеренно: навигация строится автоматически из структуры папок
# (docs/anime/<slug>/index.md + ep-NN.md) вместе с navigation.indexes,
# поэтому новые тайтлы и серии появляются в меню без правок конфига.
